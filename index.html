<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>WEETOO</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0F0F0F;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .section {
      padding: 15px;
    }

    .songs {
      display: flex;
      overflow-x: auto;
    }

    .card {
      min-width: 150px;
      margin-right: 10px;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 10px;
    }

    button {
      background: #FF7A00;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 5px;
      margin-top: 10px;
      width: 100%;
    }

    .premium {
      background: #111;
      padding: 20px;
      margin: 15px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  WEETOO 🎧
</header>

<div class="section">
  <h3>Top du moment</h3>
  <div class="songs">
    <div class="card">
      <p>Son 1</p>
      <button onclick="playSong()">Play</button>
    </div>

    <div class="card">
      <p>Son 2</p>
      <button onclick="playSong()">Play</button>
    </div>
  </div>
</div>

<div class="section">
  <h3>Nouveautés</h3>
  <div class="songs">
    <div class="card">
      <p>Son 3</p>
      <button onclick="playSong()">Play</button>
    </div>
  </div>
</div>

<div class="premium">
  <h2>Passe Premium 🔥</h2>
  <p>Accès illimité + téléchargement</p>
  <button onclick="alert('Contact WhatsApp pour activer')">
    Activer Premium
  </button>
</div>

<script>
  function playSong() {
    alert("Lecture du son...");
  }
</script>

</body>
</html>
