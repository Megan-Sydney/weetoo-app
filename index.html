<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weetoo - Streaming Audio</title>
    <!-- Liens CDN sécurisés et complets -->
    <link rel="stylesheet" href="cloudflare.com">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-color: #1DB954; --bg-dark: #121212; --card-bg: #181818; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--main-color); font-size: 3rem; margin-bottom: 10px; }
        #logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #searchBar { width: 100%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: none; background: #282828; color: white; outline: none; margin-bottom: 20px; }
        main { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .player { background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: center; }
        .track-art { width: 250px; height: 250px; margin: auto; border-radius: 10px; background-size: cover; background-position: center; background-image: url('unsplash.com'); }
        .slider_container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; }
        .seek_slider { flex-grow: 1; accent-color: var(--main-color); cursor: pointer; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .controls button { background: none; border: none; color: white; cursor: pointer; transition: 0.3s; }
        .playlist { background: var(--card-bg); padding: 20px; border-radius: 15px; max-height: 500px; overflow-y: auto; }
        .track-item { display: flex; align-items: center; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; border-bottom: 1px solid #282828; }
        .track-item:hover { background: #282828; }
        .auth-container { background: rgba(0,0,0,0.95); position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: #181818; padding: 40px; border-radius: 15px; width: 300px; text-align: center; border: 1px solid #333; }
        .auth-box input { width: 100%; padding: 10px; margin: 10px 0; background: #282828; border: none; color: white; border-radius: 5px; box-sizing: border-box; }
        #main-auth-btn { background: #1DB954; color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #toggle-auth { color: #b3b3b3; cursor: pointer; margin-top: 15px; font-size: 0.8rem; text-decoration: underline; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="auth-section" class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">Connexion à Weetoo</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button onclick="handleAuth()" id="main-auth-btn">Se connecter</button>
            <p onclick="toggleAuthMode()" id="toggle-auth">Pas de compte ? Créer un compte</p>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Weetoo</h1>
            <button onclick="handleLogout()" id="logout-btn" class="hidden">Déconnexion</button>
            <br><br>
            <input type="text" id="searchBar" placeholder="Rechercher..." onkeyup="searchMusic()">
        </header>
        <main>
            <div class="player">
                <div class="track-art" id="track-art"></div>
                <div class="track-details">
                    <h2 id="track-name">Prêt à jouer</h2>
                    <h3 id="track-artist" style="color:#b3b3b3">Choisissez une musique</h3>
                </div>
                <div class="slider_container">
                    <span id="current-time">00:00</span>
                    <input type="range" min="0" max="100" value="0" class="seek_slider" id="seek_slider" onchange="seekTo()">
                    <span id="total-duration">00:00</span>
                </div>
                <div class="controls">
                    <button onclick="prevTrack()"><i class="fa fa-step-backward fa-2x"></i></button>
                    <button onclick="playPauseTrack()" id="playpause-btn"><i class="fa fa-play-circle fa-4x"></i></button>
                    <button onclick="nextTrack()"><i class="fa fa-step-forward fa-2x"></i></button>
                </div>
            </div>
            <div class="playlist">
                <h3>Ma Sélection</h3>
                <div id="playlist-container"></div>
            </div>
        </main>
    </div>

    <script>
        let allTracks = [];
        let track_index = 0;
        let isPlaying = false;
        let curr_track = document.createElement('audio');
        let isSignUpMode = false;

        const SUPABASE_URL = 'https://sxjeysiqtdamrytiwrpk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vDtN9OUPLAQDlMtx0bCfdw_zmP9FRia';
        
        // Connexion sécurisée
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Créer un compte" : "Connexion à Weetoo";
            document.getElementById('main-auth-btn').innerText = isSignUpMode ? "S'inscrire" : "Se connecter";
            document.getElementById('toggle-auth').innerText = isSignUpMode ? "Déjà un compte ? Se connecter" : "Pas de compte ? Créer un compte";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if (isSignUpMode) {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) alert(error.message); else alert("Compte créé ! Connecte-toi maintenant.");
            } else {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert(error.message); else location.reload();
            }
        }

        async function handleLogout() { 
            await supabaseClient.auth.signOut(); 
            location.reload(); 
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                fetchMusics();
            }
        }

        async function fetchMusics() {
            let { data: musics, error } = await supabaseClient.from('musics').select('*');
            if (!error && musics.length > 0) { 
                allTracks = musics; 
                loadTrack(0); 
                renderPlaylist(allTracks); 
            }
        }

        function loadTrack(index) {
            track_index = index; 
            curr_track.src = allTracks[index].audio_url; 
            curr_track.load();
            document.getElementById("track-name").innerText = allTracks[index].title;
            document.getElementById("track-artist").innerText = allTracks[index].artist;
            document.getElementById("track-art").style.backgroundImage = `url(${allTracks[index].cover_url})`;
            curr_track.onended = nextTrack;
            setInterval(updateSlider, 1000);
        }

        function playPauseTrack() { isPlaying ? pauseTrack() : playTrack(); }
        function playTrack() { curr_track.play(); isPlaying = true; document.getElementById("playpause-btn").innerHTML = '<i class="fa fa-pause-circle fa-4x"></i>'; }
        function pauseTrack() { curr_track.pause(); isPlaying = false; document.getElementById("playpause-btn").innerHTML = '<i class="fa fa-play-circle fa-4x"></i>'; }
        function nextTrack() { track_index = (track_index + 1) % allTracks.length; loadTrack(track_index); playTrack(); }
        function prevTrack() { track_index = (track_index - 1 + allTracks.length) % allTracks.length; loadTrack(track_index); playTrack(); }
        function seekTo() { curr_track.currentTime = curr_track.duration * (document.getElementById("seek_slider").value / 100); }

        function updateSlider() {
            if (!isNaN(curr_track.duration)) {
                document.getElementById("seek_slider").value = curr_track.currentTime * (100 / curr_track.duration);
                let cm = Math.floor(curr_track.currentTime / 60), cs = Math.floor(curr_track.currentTime % 60);
                let dm = Math.floor(curr_track.duration / 60), ds = Math.floor(curr_track.duration % 60);
                document.getElementById("current-time").innerText = `${cm}:${cs < 10 ? '0' + cs : cs}`;
                document.getElementById("total-duration").innerText = `${dm}:${ds < 10 ? '0' + ds : ds}`;
            }
        }

        function renderPlaylist(list) {
            const container = document.getElementById('playlist-container'); 
            container.innerHTML = "";
            list.forEach((track, index) => {
                const div = document.createElement('div'); 
                div.classList.add('track-item');
                div.innerHTML = `<div><strong>${track.title}</strong><br><small>${track.artist}</small></div>`;
                div.onclick = () => { loadTrack(index); playTrack(); };
                container.appendChild(div);
            });
        }

        function searchMusic() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allTracks.filter(t => t.title.toLowerCase().includes(term) || t.artist.toLowerCase().includes(term));
            renderPlaylist(filtered);
        }

        checkUser();
    </script>
</body>
</html>
